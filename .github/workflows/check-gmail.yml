name: Meta Ads Gmail Monitor

on:
  schedule:
    # Run every 10 minutes, 24/7
    - cron: '*/10 * * * *'
  # Allow manual trigger from the Actions tab for testing
  workflow_dispatch:

# ── Concurrency ────────────────────────────────────────────────────────────
# If an alert loop is running (up to 30 min), queue the next scheduled run
# rather than cancelling it.  This prevents two runs racing on the same DB.
concurrency:
  group: gmail-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45   # generous ceiling: 30-min alert + overhead

    steps:
      # ── 1. Checkout code ───────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Restore charge history database from cache ──────────────────
      # The cache key includes a version prefix so it can be invalidated
      # manually if needed (bump v1 → v2).
      # restore-keys allows a partial match so we always get the most
      # recent snapshot even if the exact key has never been saved yet.
      - name: Restore charge history cache
        uses: actions/cache@v4
        with:
          path: data/
          key: charge-history-v1-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            charge-history-v1-${{ runner.os }}-

      # ── 3. Set up Python ───────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ── 4. Install dependencies ────────────────────────────────────────
      - name: Install dependencies
        run: pip install --quiet -r requirements.txt

      # ── 5. Run the main detection script ──────────────────────────────
      # All secrets are injected as environment variables — never echoed.
      - name: Run Gmail monitor
        env:
          GMAIL_CLIENT_ID:      ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET:  ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN:  ${{ secrets.GMAIL_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_gmail.py

      # ── 6. Save charge history database back to cache ──────────────────
      # This step runs even if the monitor step fails, so we don't lose
      # state when a transient API error occurs.
      - name: Save charge history cache
        if: always()
        uses: actions/cache@v4
        with:
          path: data/
          key: charge-history-v1-${{ runner.os }}-${{ github.run_id }}-${{ github.run_attempt }}
